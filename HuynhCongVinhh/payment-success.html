<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thanh toán thành công</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:18px}
    .card{max-width:420px;margin:20px auto;padding:18px;border:1px solid #cde;border-radius:8px;background:#f7fffb}
    .ok{color:green;font-weight:600}
    a.button{display:inline-block;margin-top:12px;padding:8px 12px;border-radius:6px;background:#007bff;color:#fff;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <h2 class="ok">Thanh toán thành công</h2>
    <div id="details"></div>
    <a class="button" href="payment-qr.html">Quay về trang thanh toán</a>
  </div>

  <script>
    const p = new URLSearchParams(location.search)
    const status = p.get('status') || 'unknown'
    const id = p.get('paymentId') || ''
    const time = p.get('time') ? new Date(Number(p.get('time'))) : null
    const d = document.getElementById('details')
    d.innerHTML = '<p><strong>Payment ID:</strong> ' + id + '</p><p><strong>Trạng thái:</strong> ' + status + '</p>' + (time?('<p><strong>Thời gian:</strong> ' + time + '</p>'):'')
  </script>
</body>
</html>
