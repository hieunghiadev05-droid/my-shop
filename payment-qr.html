<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thanh toán QR</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:18px}
    .card{max-width:420px;margin:20px auto;padding:18px;border:1px solid #ddd;border-radius:8px}
    .qr{display:flex;justify-content:center;align-items:center;margin:12px 0;height:320px;border:1px dashed #e0e0e0;border-radius:8px;padding:8px;background:#fff}
    input,button{width:100%;padding:10px;margin:6px 0;font-size:16px}
    .small{font-size:13px;color:#555}
  </style>
</head>
<body>
  <div class="card">
    <h2>Thanh toán online (QR)</h2>
    <label class="small">Số tiền (VND)</label>
    <input id="amount" type="number" value="10000" />
    <div class="small">Quét mã bằng ứng dụng tương thích hoặc mở liên kết trên điện thoại</div>
    <div class="qr">
  <img src="HuynhCongVinhh/assets/img/Shio.png" alt="QR thanh toán">
</div>
    <p class="small">Payment ID: <span id="pid"></span></p>
  </div>

  <!-- Load a lightweight QR lib from CDN; if blocked we'll fallback to Google Charts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    function uid(){return 'p'+Date.now().toString(36)}
    function by(id){return document.getElementById(id)}

    // If page opened with params, use them (so redirect from checkout works)
    const params = new URLSearchParams(location.search)
    let paymentId = params.get('paymentId') || uid()
    by('pid').textContent = paymentId
    if (params.get('amount')) by('amount').value = params.get('amount')

    function buildUrls(){
      const base = location.href.replace(/[^\/]*$/, '')
      const returnUrl = base + 'payment-success.html?paymentId=' + paymentId + '&status=success'
      const momoUrl = base + 'momo_pay.html?paymentId=' + paymentId + '&amount=' + encodeURIComponent(by('amount').value) + '&returnUrl=' + encodeURIComponent(returnUrl)
      return {momoUrl, returnUrl}
    }

    function renderQR(){
      const urls = buildUrls()
      // Clear any previous QR output
      const qrContainer = document.querySelector('.qr')
      qrContainer.innerHTML = ''
      // Prefer local/inline QR generation via QRCode lib
      if (window.QRCode) {
        const node = document.createElement('div')
        qrContainer.appendChild(node)
        try {
          new QRCode(node, { text: urls.momoUrl, width: 300, height: 300 })
        } catch (e) {
          const img = document.createElement('img')
          img.src = 'https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=' + encodeURIComponent(urls.momoUrl)
          qrContainer.appendChild(img)
        }
      } else {
        // Fallback to Google Charts image
        const img = document.createElement('img')
        img.id = 'qrImg'
        img.alt = 'QR code'
        img.src = 'https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=' + encodeURIComponent(urls.momoUrl)
        qrContainer.appendChild(img)
      }
      // set link for openLink button and direct link fallback
      by('openLink').dataset.url = urls.momoUrl
      let linkEl = document.getElementById('directLink')
      if (!linkEl) {
        linkEl = document.createElement('div')
        linkEl.id = 'directLink'
        linkEl.className = 'small'
        by('pid').parentNode.appendChild(linkEl)
      }
      linkEl.innerHTML = 'Liên kết trực tiếp: <a href="' + urls.momoUrl + '">' + urls.momoUrl + '</a>'
    }

    by('regen').addEventListener('click', ()=>{
      paymentId = uid()
      by('pid').textContent = paymentId
      renderQR()
    })

    by('openLink').addEventListener('click', ()=>{
      const u = by('openLink').dataset.url || buildUrls().momoUrl
      location.href = u
    })

    renderQR()
  </script>
</body>
</html>
